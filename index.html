<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile Card</title>
    <!-- We'll link our style.css here in the next step -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="profile-card">
        <img src="doa.jpg" alt="Profile Picture" class="profile-img">
        <h2 class="profile-name">Fahad Baganian</h2>
        <p class="profile-bio">
            Passionate software engineer with a knack for building intuitive and efficient web applications. 
            Dedicated to clean code, continuous learning, and impactful solutions.
        </p>
        <div class="social-links">
            <a href="https://linkedin.com/in/janedoe" target="_blank" class="social-btn">LinkedIn</a>
            <a href="https://github.com/janedoe" target="_blank" class="social-btn">GitHub</a>
            <button id="theme-toggle" class="social-btn">Light Mode</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
